version: '3'

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    volumes:
      # Mount source code for development
      - ./src:/app/src
      - ./public:/app/public
      # Don't mount these directories to avoid conflicts
      - /app/node_modules
      - /app/.next
    environment:
      - NODE_ENV=development
    command: npm run dev